<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>旗舰地图 · 边缘追踪矢量线</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#05020c;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;padding:20px}
h2{font-size:13px;letter-spacing:3px;color:rgba(5,248,248,.35)}p{font-size:10px;color:rgba(227,73,237,.2)}
.row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
canvas{border:1px solid rgba(227,73,237,.18);border-radius:10px;box-shadow:0 0 30px rgba(227,73,237,.06)}
</style></head><body>
<h2>旗舰版 · 边缘追踪矢量线</h2>
<div class="row">
<div><p style="color:rgba(227,73,237,.25)">原图</p><canvas id="orig"></canvas></div>
<div><p style="color:rgba(5,248,248,.3)">旗舰版线框</p><canvas id="out" width="1800" height="1200"></canvas></div></div>
<script>
const img=new Image()
img.onload=()=>{
  const iw=img.naturalWidth,ih=img.naturalHeight
  document.getElementById('orig').width=iw;document.getElementById('orig').height=ih
  document.getElementById('orig').getContext('2d').drawImage(img,0,0)

  // 提取像素（不模糊，保留原始精度）
  const tc=document.createElement('canvas');tc.width=iw;tc.height=ih;const tctx=tc.getContext('2d');tctx.drawImage(img,0,0)
  const data=tctx.getImageData(0,0,iw,ih).data
  function bright(x,y){if(x<0||x>=iw||y<0||y>=ih)return 0;const i=(y*iw+x)*4;return data[i]*.299+data[i+1]*.587+data[i+2]*.114}

  // 构建边缘强度图 + 方向图
  const step=2 // 采样步长，每隔2px采样一次加速
  const gw=Math.floor(iw/step),gh=Math.floor(ih/step)
  const edgeMag=new Float32Array(gw*gh)
  const edgeDir=new Float32Array(gw*gh) // 0=水平, 1=垂直
  for(let gy=0;gy<gh;gy++)for(let gx=0;gx<gw;gx++){
    const x=gx*step,y=gy*step
    const tl=bright(x-2,y-2),tc2=bright(x,y-2),tr=bright(x+2,y-2)
    const ml=bright(x-2,y),mr=bright(x+2,y)
    const bl=bright(x-2,y+2),bc2=bright(x,y+2),br=bright(x+2,y+2)
    const gx2=-tl+tr-2*ml+2*mr-bl+br
    const gy2=-tl-2*tc2-tr+bl+2*bc2+br
    const i=gy*gw+gx
    edgeMag[i]=Math.sqrt(gx2*gx2+gy2*gy2)
    edgeDir[i]=Math.abs(gy2)>Math.abs(gx2)?1:0
  }

  // ══ 二值化边缘渲染 ══
  const W=1800,H=1200,ctx=document.getElementById('out').getContext('2d')

  // 预计算边缘
  const edgeMag2=new Float32Array(iw*ih);let maxMag=0
  for(let y=1;y<ih-1;y++)for(let x=1;x<iw-1;x++){
    const tl=bright(x-1,y-1),tc2=bright(x,y-1),tr=bright(x+1,y-1),ml=bright(x-1,y),mr=bright(x+1,y),bl=bright(x-1,y+1),bc2=bright(x,y+1),br=bright(x+1,y+1)
    const mag=Math.sqrt(Math.pow(-tl+tr-2*ml+2*mr-bl+br,2)+Math.pow(-tl-2*tc2-tr+bl+2*bc2+br,2))
    edgeMag2[y*iw+x]=mag;if(mag>maxMag)maxMag=mag
  }
  const threshold=maxMag*0.22

  // 二值化边缘 + 连通区域过滤（去文字）
  const binary=new Uint8Array(iw*ih)
  for(let y=0;y<ih;y++)for(let x=0;x<iw;x++){
    binary[y*iw+x]=edgeMag2[y*iw+x]>threshold?1:0
  }

  // 连通区域标记（简化版：检查8邻域，只保留大面积区域）
  const visited=new Uint8Array(iw*ih),keep=new Uint8Array(iw*ih)
  for(let y=0;y<ih;y++)for(let x=0;x<iw;x++){
    if(!binary[y*iw+x]||visited[y*iw+x])continue
    // BFS 找连通区域
    const stack=[{x,y}],region=[]
    visited[y*iw+x]=1
    while(stack.length){
      const p=stack.pop();region.push(p)
      for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
        if(!dx&&!dy)continue
        const nx=p.x+dx,ny=p.y+dy
        if(nx<0||nx>=iw||ny<0||ny>=ih||visited[ny*iw+nx]||!binary[ny*iw+nx])continue
        visited[ny*iw+nx]=1;stack.push({x:nx,y:ny})
      }
    }
    // 区域面积 > 50 像素 = 墙壁，保留；否则是文字/噪点，丢弃
    if(region.length>50)for(const p of region)keep[p.y*iw+p.x]=1
  }

  // 渲染保留的边缘
  const ec=document.createElement('canvas');ec.width=iw;ec.height=ih;const ectx=ec.getContext('2d')
  ectx.fillStyle='#060210';ectx.fillRect(0,0,iw,ih)
  const img2=ectx.createImageData(iw,ih)
  for(let y=0;y<ih;y++)for(let x=0;x<iw;x++){
    const i2=(y*iw+x)*4
    if(!keep[y*iw+x]){img2.data[i2]=6;img2.data[i2+1]=2;img2.data[i2+2]=16;img2.data[i2+3]=255;continue}
    const e=edgeMag2[y*iw+x]
    if(e>threshold*2){img2.data[i2]=200;img2.data[i2+1]=120;img2.data[i2+2]=240;img2.data[i2+3]=255}
    else{img2.data[i2]=90;img2.data[i2+1]=40;img2.data[i2+2]=140;img2.data[i2+3]=255}
  }
  ectx.putImageData(img2,0,0)

  // 锐利缩放：关平滑，像素完美
  ctx.imageSmoothingEnabled=false
  ctx.drawImage(ec,0,0,W,H)

  // 外框
  ctx.strokeStyle='rgba(227,73,237,.22)';ctx.lineWidth=2;ctx.strokeRect(3,3,W-6,H-6)
}

img.src='/images/maps-clean/ascent.png'
img.src='/images/maps/ascent.png'
</script></body></html>
