<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>画布背景 · 顶配模板</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#05020c;display:flex;align-items:center;justify-content:center;min-height:100vh;gap:16px;padding:20px}
.canvas{width:900px;height:600px;border:1px solid rgba(227,73,237,.14);border-radius:14px;position:relative;overflow:hidden;background:#050210;display:flex;align-items:center;justify-content:center}
/* 地图包装器 — 对标顶配.mw */
.mapW{width:82%;height:78%;border-radius:14px;background:linear-gradient(135deg,rgba(24,14,42,.45),rgba(8,4,18,.25));border:1px solid rgba(227,73,237,.12);position:relative;overflow:hidden;box-shadow:0 0 120px rgba(0,0,0,.4),inset 0 0 100px rgba(227,73,237,.015),0 8px 50px rgba(227,73,237,.04);animation:mapFloat 10s ease-in-out infinite;z-index:2}
/* 网格叠加 */
.mapW::before{content:'';position:absolute;inset:0;z-index:0;background-image:linear-gradient(rgba(227,73,237,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(227,73,237,.03) 1px,transparent 1px);background-size:42px 42px;pointer-events:none}
/* 内发光 */
.mapW::after{content:'';position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse at center,rgba(5,248,248,.03),transparent 70%);pointer-events:none;animation:innerGlow 6s ease-in-out infinite}
/* 画布底光 — 对标顶配.ca */
.canvas::before{content:'';position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse 600px 400px at 55% 40%,rgba(227,73,237,.07),transparent 60%),radial-gradient(ellipse 350px 250px at 12% 82%,rgba(5,248,248,.03),transparent 52%);animation:bgPulse 12s ease-in-out infinite alternate}
/* 画布网格 */
.canvas::after{content:'';position:absolute;inset:0;z-index:0;opacity:.45;background-image:radial-gradient(circle,rgba(227,73,237,.035) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
/* 装饰光点 — 对标顶配.sd1/.sd2 */
.glow{position:absolute;border-radius:50%;z-index:1;pointer-events:none;animation:glowPulse 3s ease-in-out infinite}
.glow1{top:8%;right:6%;width:14px;height:14px;background:rgba(227,73,237,.25);border:2px solid rgba(227,73,237,.4);box-shadow:0 0 18px rgba(227,73,237,.25)}
.glow2{bottom:10%;left:8%;width:10px;height:10px;background:rgba(5,248,248,.2);border:2px solid rgba(5,248,248,.35);box-shadow:0 0 14px rgba(5,248,248,.2);animation-delay:1.2s}
/* 装饰形状 — 对标顶配.sh1/.sh2 */
.shape1{position:absolute;top:6%;left:5%;width:55px;height:55px;border-radius:50%;border:2px solid rgba(5,248,248,.3);background:radial-gradient(circle,rgba(5,248,248,.08),transparent);box-shadow:0 0 28px rgba(5,248,248,.08),0 0 60px rgba(5,248,248,.04);z-index:1;pointer-events:none;animation:shapePulse 3.5s ease-in-out infinite}
.shape2{position:absolute;bottom:8%;right:5%;width:80px;height:22px;border-radius:4px;border:2px solid rgba(227,73,237,.3);background:linear-gradient(90deg,rgba(227,73,237,.08),transparent);box-shadow:0 0 24px rgba(227,73,237,.08);z-index:1;pointer-events:none;transform:rotate(-15deg);animation:shapePulse 4s ease-in-out infinite 1.5s}
@keyframes mapFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes innerGlow{0%,100%{opacity:.4}50%{opacity:.8}}
@keyframes bgPulse{0%{opacity:.6}100%{opacity:1}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 10px currentColor}50%{box-shadow:0 0 30px currentColor,0 0 50px currentColor}}
@keyframes shapePulse{0%,100%{opacity:.4}50%{opacity:.75}}
</style></head><body>
<div class="canvas">
  <div class="shape1"></div><div class="shape2"></div>
  <div class="glow glow1"></div><div class="glow glow2"></div>
  <div class="mapW"></div>
</div>
</body></html>
