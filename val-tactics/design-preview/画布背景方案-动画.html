<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>画布背景方案 · 动画版</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#05020c;display:flex;flex-direction:column;align-items:center;gap:20px;padding:20px}
h2{font-size:12px;letter-spacing:3px;color:rgba(5,248,248,.35)}
.row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.card{text-align:center}.card p{font-size:10px;color:rgba(227,73,237,.25);margin-top:6px}
.canvas{width:400px;height:280px;border:1px solid rgba(227,73,237,.16);border-radius:10px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.map{width:68%;height:62%;border-radius:8px;background:rgba(10,5,20,.6);border:1px solid rgba(5,248,248,.08);position:relative;z-index:1}
</style></head><body>
<h2>画布背景方案（4种 · 带动画）</h2>
<div class="row">
<div class="card"><div class="canvas" id="a"><div class="map"></div></div><p>A · 呼吸光晕</p></div>
<div class="card"><div class="canvas" id="b"><div class="map"></div></div><p>B · 脉冲网格</p></div>
<div class="card"><div class="canvas" id="c"><div class="map"></div></div><p>C · 流星光点</p></div>
<div class="card"><div class="canvas" id="d"><div class="map"></div></div><p>D · 游走扫描</p></div>
</div>
<style>
/* A: 呼吸光晕 */
#a{background:radial-gradient(ellipse 300px 200px at 50% 45%,rgba(227,73,237,.06),transparent 60%),radial-gradient(ellipse 200px 150px at 25% 80%,rgba(5,248,248,.03),transparent 55%),#05020c;animation:bgBreatheA 6s ease-in-out infinite alternate}
@keyframes bgBreatheA{0%{opacity:.7}100%{opacity:1}}

/* B: 脉冲网格 */
#b{background:#05020c;background-image:linear-gradient(rgba(227,73,237,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(227,73,237,.04) 1px,transparent 1px);background-size:40px 40px}
#b::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 260px 180px at 50% 45%,rgba(5,248,248,.06),transparent 60%);animation:bgBreatheB 4s ease-in-out infinite;pointer-events:none}
@keyframes bgBreatheB{0%,100%{opacity:.4}50%{opacity:1}}

/* C: 流星光点 */
#c{background:#05020c}
#c::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 350px 250px at 55% 10%,rgba(227,73,237,.08),transparent 60%),radial-gradient(ellipse 220px 180px at 10% 80%,rgba(5,248,248,.04),transparent 55%);pointer-events:none}
#c .dot{position:absolute;border-radius:50%;pointer-events:none;animation:dotFloat 8s ease-in-out infinite}
#c .dot:nth-child(1){width:6px;height:6px;background:#05F8F8;box-shadow:0 0 12px #05F8F8;top:25%;left:15%;animation-delay:0s}
#c .dot:nth-child(2){width:4px;height:4px;background:#E349ED;box-shadow:0 0 8px #E349ED;top:15%;right:25%;animation-delay:2.5s}
#c .dot:nth-child(3){width:5px;height:5px;background:#05F8F8;box-shadow:0 0 10px #05F8F8;bottom:20%;left:30%;animation-delay:5s}
#c .dot:nth-child(4){width:3px;height:3px;background:#E349ED;box-shadow:0 0 6px #E349ED;bottom:30%;right:20%;animation-delay:1.5s}
@keyframes dotFloat{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:.8;transform:translateY(-16px)}}

/* D: 游走扫描线 */
#d{background:#05020c}
#d::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 300px 200px at 50% 40%,rgba(227,73,237,.06),transparent 60%),radial-gradient(ellipse 200px 150px at 60% 55%,rgba(5,248,248,.04),transparent 50%);pointer-events:none}
#d::after{content:'';position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(5,248,248,.15),transparent);animation:scanMove 5s ease-in-out infinite;pointer-events:none}
@keyframes scanMove{0%,100%{top:15%}50%{top:75%}}
</style>
<script>
// 方案C加流星点
['c','d'].forEach(id=>{
  for(let i=0;i<4;i++){
    const d=document.createElement('div');d.className='dot'
    document.getElementById(id).appendChild(d)
  }
})
</script></body></html>
