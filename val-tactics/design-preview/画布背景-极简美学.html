<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>画布背景 · 极简美学</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#05020c;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:8px;padding:20px}
h2{font-size:11px;letter-spacing:3px;color:rgba(5,248,248,.25)}

.canvas{width:900px;height:600px;border:1px solid rgba(227,73,237,.12);border-radius:12px;position:relative;overflow:hidden;background:#050210}
.map{position:absolute;top:10%;left:10%;width:80%;height:80%;border-radius:12px;background:rgba(12,7,24,.35);border:1px solid rgba(227,73,237,.08);z-index:2;box-shadow:0 0 0 20px rgba(5,2,16,.7),0 0 100px rgba(227,73,237,.03),inset 0 0 80px rgba(5,248,248,.01)}
</style></head><body>
<h2>画布背景 · 极简美学</h2>
<div class="canvas" id="c"><div class="map"></div></div>
<script>
const cnv=document.getElementById('c')

// 1. 单一柔光——大面积低透明度，不做多光源
const light=document.createElement('div');light.style.cssText='position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse 600px 400px at 50% 45%,rgba(227,73,237,.06),transparent 65%);animation:lightBreath 10s ease-in-out infinite alternate;pointer-events:none'
cnv.appendChild(light)

// 2. 细密暗点阵——比网格更柔
const dots=document.createElement('div');dots.style.cssText='position:absolute;inset:0;z-index:0;opacity:.35;background-image:radial-gradient(circle,rgba(227,73,237,.04) 1px,transparent 1px);background-size:24px 24px;pointer-events:none'
cnv.appendChild(dots)

// 3. 四角微光——极简
[[14,14],[886-5,14],[14,586-5],[886-5,586-5]].forEach(([x,y])=>{
  const d=document.createElement('div');d.style.cssText=`position:absolute;z-index:1;top:${y}px;left:${x}px;width:5px;height:5px;border-radius:50%;background:#05F8F8;box-shadow:0 0 8px rgba(5,248,248,.4);pointer-events:none;animation:cornerGlow 4s ease-in-out infinite ${Math.random()*2}s`
  cnv.appendChild(d)
})

// 4. 稀疏粒子——15个，慢速大范围浮动
for(let i=0;i<15;i++){
  const cp=Math.random()>.5?'rgba(5,248,248,.25)':'rgba(227,73,237,.2)'
  const s=1+Math.random()*2
  const p=document.createElement('div');p.style.cssText=`position:absolute;pointer-events:none;z-index:0;width:${s}px;height:${s}px;border-radius:50%;background:${cp};box-shadow:0 0 ${3+s*2}px ${cp};top:${10+Math.random()*80}%;left:${10+Math.random()*80}%;animation:particle ${12+Math.random()*10}s linear ${Math.random()*8}s infinite`
  cnv.appendChild(p)
}

// 5. 单环——极淡，慢旋转
const ring=document.createElement('div');ring.style.cssText='position:absolute;top:50%;left:50%;width:320px;height:320px;border-radius:50%;border:1px solid rgba(227,73,237,.04);transform:translate(-50%,-50%) rotateX(55deg);pointer-events:none;z-index:0;animation:ringSpin 30s linear infinite,ringBreath 8s ease-in-out infinite'
cnv.appendChild(ring)

// 6. 底部微光条
const bar=document.createElement('div');bar.style.cssText='position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(5,248,248,.08),transparent);pointer-events:none;z-index:0;animation:barBreath 5s ease-in-out infinite'
cnv.appendChild(bar)
</script>
<style>
@keyframes lightBreath{0%{opacity:.5}100%{opacity:.9}}
@keyframes cornerGlow{0%,100%{opacity:.3}50%{opacity:.8}}
@keyframes particle{0%{opacity:.05;transform:translate(0,0)}25%{opacity:.3;transform:translate(15px,-20px)}50%{opacity:.08;transform:translate(30px,-10px)}75%{opacity:.25;transform:translate(10px,-25px)}100%{opacity:.05;transform:translate(0,0)}}
@keyframes ringSpin{to{transform:translate(-50%,-50%) rotateX(55deg) rotateZ(360deg)}}
@keyframes ringBreath{0%,100%{opacity:.25}50%{opacity:.5}}
@keyframes barBreath{0%,100%{opacity:.3}50%{opacity:.7}}
</style></body></html>
