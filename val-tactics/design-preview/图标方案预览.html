<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>图标方案</title>
<style>body{background:#0a0612;color:#fff;font-family:'PingFang SC','Microsoft YaHei',sans-serif;padding:40px;display:flex;flex-wrap:wrap;gap:60px;justify-content:center;align-items:flex-start}
.card{text-align:center;width:180px}.card svg{border-radius:16px;box-shadow:0 0 40px rgba(0,0,0,.3);margin-bottom:12px;background:#0d0818}.card h3{font-size:13px;color:#888;margin:0 0 4px}.card p{font-size:11px;color:#555;margin:0}</style></head><body>

<div class="card"><h3>方案 A · 渐变 V</h3>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="120" height="120"><defs><linearGradient id="a" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E349ED"/><stop offset="100%" stop-color="#05F8F8"/></linearGradient></defs><rect width="80" height="80" rx="16" fill="#0a0612"/><rect width="80" height="80" rx="16" fill="none" stroke="url(#a)" stroke-width="2.5" opacity=".7"/><text x="40" y="54" text-anchor="middle" font-family="Arial" font-size="40" font-weight="900" fill="url(#a)">V</text></svg>
<p>粉青渐变 · 简洁</p></div>

<div class="card"><h3>方案 B · 战术准星</h3>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="120" height="120"><defs><linearGradient id="b" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E349ED"/><stop offset="100%" stop-color="#05F8F8"/></linearGradient></defs><rect width="80" height="80" rx="18" fill="#0a0612"/><circle cx="40" cy="40" r="26" fill="none" stroke="url(#b)" stroke-width="3"/><circle cx="40" cy="40" r="4" fill="url(#b)"/><line x1="40" y1="8" x2="40" y2="25" stroke="url(#b)" stroke-width="2.5"/><line x1="40" y1="55" x2="40" y2="72" stroke="url(#b)" stroke-width="2.5"/><line x1="8" y1="40" x2="25" y2="40" stroke="url(#b)" stroke-width="2.5"/><line x1="55" y1="40" x2="72" y2="40" stroke="url(#b)" stroke-width="2.5"/></svg>
<p>战术准星 · 游戏感</p></div>

<div class="card"><h3>方案 C · 闪电 T</h3>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="120" height="120"><defs><linearGradient id="c" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E349ED"/><stop offset="100%" stop-color="#05F8F8"/></linearGradient></defs><rect width="80" height="80" rx="16" fill="#0a0612"/><text x="40" y="56" text-anchor="middle" font-family="Arial" font-size="48" font-weight="900" fill="url(#c)">T</text><polygon points="30,8 50,8 44,32 56,32 28,72 34,42 22,42" fill="url(#c)" opacity=".9"/></svg>
<p>字母 T + 闪电 · 识别度高</p></div>

<div class="card"><h3>方案 D · 数据折线</h3>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="120" height="120"><defs><linearGradient id="d" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E349ED"/><stop offset="100%" stop-color="#05F8F8"/></linearGradient></defs><rect width="80" height="80" rx="18" fill="#0a0612"/><polyline points="10,60 28,35 42,48 56,22 70,30" fill="none" stroke="url(#d)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="56" cy="22" r="5" fill="#E349ED"/><circle cx="70" cy="30" r="4" fill="#05F8F8"/></svg>
<p>数据走势 · 智能感</p></div>

<div class="card"><h3>方案 E · 战术棋盘</h3>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="120" height="120"><defs><linearGradient id="e" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E349ED"/><stop offset="100%" stop-color="#05F8F8"/></linearGradient></defs><rect width="80" height="80" rx="16" fill="#0a0612"/><rect x="14" y="14" width="24" height="24" rx="5" fill="none" stroke="url(#e)" stroke-width="2.5" opacity=".8"/><rect x="42" y="14" width="24" height="24" rx="5" fill="url(#e)" opacity=".15"/><rect x="14" y="42" width="24" height="24" rx="5" fill="url(#e)" opacity=".15"/><rect x="42" y="42" width="24" height="24" rx="5" fill="none" stroke="url(#e)" stroke-width="2.5" opacity=".8"/></svg>
<p>棋盘布局 · 战术感</p></div>

<div class="card"><h3>方案 F · 菱形标志</h3>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="120" height="120"><defs><linearGradient id="f" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#E349ED"/><stop offset="100%" stop-color="#05F8F8"/></linearGradient></defs><rect width="80" height="80" rx="18" fill="#0a0612"/><polygon points="40,10 65,40 40,70 15,40" fill="none" stroke="url(#f)" stroke-width="3"/><polygon points="40,22 55,40 40,58 25,40" fill="url(#f)" opacity=".4"/><text x="40" y="46" text-anchor="middle" font-family="Arial" font-size="22" font-weight="900" fill="#0a0612">V</text></svg>
<p>菱形 · 高级感</p></div>
</body></html>
