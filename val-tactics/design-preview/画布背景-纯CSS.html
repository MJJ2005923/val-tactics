<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>画布背景 · 纯CSS</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#05020c;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:10px;padding:20px}
h2{font-size:11px;letter-spacing:3px;color:rgba(5,248,248,.25)}
.canvas{width:900px;height:600px;border:1px solid rgba(227,73,237,.12);border-radius:12px;position:relative;overflow:hidden;background:#050210}
/* 柔光 */
.canvas::before{content:'';position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse 600px 400px at 50% 45%,rgba(227,73,237,.06),transparent 65%);animation:lightBreath 10s ease-in-out infinite alternate}
/* 点阵 */
.canvas::after{content:'';position:absolute;inset:0;z-index:0;opacity:.35;background-image:radial-gradient(circle,rgba(227,73,237,.04) 1px,transparent 1px);background-size:24px 24px}
.map{position:absolute;top:10%;left:10%;width:80%;height:80%;border-radius:12px;background:rgba(12,7,24,.35);border:1px solid rgba(227,73,237,.08);z-index:2;box-shadow:0 0 0 20px rgba(5,2,16,.7),0 0 100px rgba(227,73,237,.03),inset 0 0 80px rgba(5,248,248,.01)}
/* 四角光点 */
.c{position:absolute;z-index:1;width:5px;height:5px;border-radius:50%;background:#05F8F8;box-shadow:0 0 8px rgba(5,248,248,.4);animation:cornerGlow 4s ease-in-out infinite}
.c1{top:14px;left:14px}.c2{top:14px;right:14px;animation-delay:1s}
.c3{bottom:14px;left:14px;animation-delay:2s}.c4{bottom:14px;right:14px;animation-delay:.5s}
/* 粒子 */
.p{position:absolute;z-index:0;border-radius:50%;animation:particle 14s linear infinite}
.p1{top:25%;left:15%;width:2px;height:2px;background:rgba(5,248,248,.3);box-shadow:0 0 4px rgba(5,248,248,.2);animation-delay:0s}
.p2{top:15%;right:20%;width:3px;height:3px;background:rgba(227,73,237,.25);box-shadow:0 0 5px rgba(227,73,237,.15);animation-delay:3s}
.p3{bottom:20%;left:25%;width:2px;height:2px;background:rgba(5,248,248,.25);box-shadow:0 0 4px rgba(5,248,248,.15);animation-delay:6s}
.p4{bottom:25%;right:18%;width:3px;height:3px;background:rgba(227,73,237,.2);box-shadow:0 0 5px rgba(227,73,237,.1);animation-delay:9s}
.p5{top:40%;left:30%;width:2px;height:2px;background:rgba(5,248,248,.2);box-shadow:0 0 3px rgba(5,248,248,.1);animation-delay:2s}
.p6{top:35%;right:30%;width:2px;height:2px;background:rgba(227,73,237,.2);box-shadow:0 0 3px rgba(227,73,237,.1);animation-delay:5s}
.p7{bottom:35%;left:40%;width:3px;height:3px;background:rgba(5,248,248,.2);box-shadow:0 0 4px rgba(5,248,248,.1);animation-delay:8s}
.p8{bottom:40%;right:35%;width:2px;height:2px;background:rgba(227,73,237,.2);box-shadow:0 0 3px rgba(227,73,237,.1);animation-delay:1s}
/* 底部光条 */
.bar{position:absolute;bottom:0;left:12%;right:12%;height:1px;z-index:0;background:linear-gradient(90deg,transparent,rgba(5,248,248,.08),transparent);animation:barBreath 5s ease-in-out infinite}
/* 旋转光环 */
.halo{position:absolute;top:50%;left:50%;width:320px;height:320px;border-radius:50%;border:1px solid rgba(227,73,237,.03);transform:translate(-50%,-50%);z-index:0;animation:haloSpin 30s linear infinite,haloBreath 8s ease-in-out infinite}
@keyframes lightBreath{0%{opacity:.5}100%{opacity:1}}
@keyframes cornerGlow{0%,100%{opacity:.25}50%{opacity:.75}}
@keyframes particle{0%{opacity:.05;transform:translate(0,0)}25%{opacity:.3;transform:translate(20px,-25px)}50%{opacity:.06;transform:translate(35px,-10px)}75%{opacity:.25;transform:translate(15px,-30px)}100%{opacity:.05;transform:translate(0,0)}}
@keyframes barBreath{0%,100%{opacity:.3}50%{opacity:.7}}
@keyframes haloSpin{to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes haloBreath{0%,100%{opacity:.2}50%{opacity:.5}}
</style></head><body>
<h2>画布背景 · 极简美学</h2>
<div class="canvas">
  <div class="halo"></div>
  <div class="c c1"></div><div class="c c2"></div><div class="c c3"></div><div class="c c4"></div>
  <div class="p p1"></div><div class="p p2"></div><div class="p p3"></div><div class="p p4"></div>
  <div class="p p5"></div><div class="p p6"></div><div class="p p7"></div><div class="p p8"></div>
  <div class="bar"></div>
  <div class="map"></div>
</div>
</body></html>
