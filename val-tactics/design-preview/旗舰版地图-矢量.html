<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>旗舰版矢量战术地图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#05020c;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:10px;padding:20px}
h2{font-size:13px;letter-spacing:3px;color:rgba(5,248,248,.35)}p{font-size:10px;color:rgba(227,73,237,.2)}
canvas{border:1px solid rgba(227,73,237,.18);border-radius:12px;box-shadow:0 0 50px rgba(227,73,237,.08)}
</style></head><body>
<h2>AS 亚海悬城</h2>
<canvas id="c" width="1800" height="1200"></canvas><p>旗舰版矢量战术地图 · 1800×1200 · 纯代码渲染</p>
<script>
const W=1800,H=1200,ctx=document.getElementById('c').getContext('2d')
function r(a){return `rgba(${a.join(',')})`}

// ══ 核心渲染函数 ══
function rect(x,y,w,h,r){ctx.beginPath();if(r){ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath()}else ctx.rect(x,y,w,h)}
function wall(x,y,w,h,c){ctx.fillStyle=c||'rgba(30,12,50,.7)';rect(x,y,w,h,4);ctx.fill();ctx.strokeStyle='rgba(180,80,220,.35)';ctx.lineWidth=1.8;rect(x,y,w,h,4);ctx.stroke()}
function area(x,y,w,h,label,alpha){ctx.fillStyle=`rgba(12,5,24,${alpha||.5})`;rect(x,y,w,h,6);ctx.fill();ctx.strokeStyle='rgba(227,73,237,.1)';ctx.lineWidth=1;ctx.stroke();if(label){ctx.fillStyle='rgba(227,73,237,.2)';ctx.font='11px "PingFang SC"';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,x+w/2,y+h/2)}}
function site(x,y,l,c){ctx.fillStyle=c+'10';ctx.beginPath();ctx.arc(x,y,55,0,Math.PI*2);ctx.fill();ctx.strokeStyle=c+'40';ctx.lineWidth=2.5;ctx.setLineDash([10,5]);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=c;ctx.font='bold 34px "PingFang SC"';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(l,x,y)}
function cover(x,y,r){ctx.fillStyle='rgba(20,10,40,.8)';ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(180,100,220,.35)';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='rgba(0,0,0,.4)';ctx.beginPath();ctx.arc(x,y,r*.3,0,Math.PI*2);ctx.fill()}
function box(x,y,w,h){ctx.fillStyle='rgba(227,73,237,.18)';rect(x,y,w,h,3);ctx.fill();ctx.strokeStyle='rgba(227,73,237,.3)';ctx.lineWidth=1.2;ctx.stroke()}
function label(t,x,y){ctx.fillStyle='rgba(0,0,0,.5)';const m=ctx.measureText(t).width;ctx.fillRect(x-m/2-8,y-8,m+16,18);ctx.fillStyle='rgba(5,248,248,.35)';ctx.font='11px "PingFang SC"';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t,x,y+1)}
function spawn(x,y,team){const c=team==='a'?'rgba(255,70,85,.2)':'rgba(5,248,248,.15)',s=team==='a'?'rgba(255,70,85,.3)':'rgba(5,248,248,.25)' ;ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,22,0,Math.PI*2);ctx.fill();ctx.strokeStyle=s;ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle=s;ctx.font='9px "PingFang SC"';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(team==='a'?'Ω攻':'α守',x,y)}

// ══ 背景 ══
ctx.fillStyle='#060210';ctx.fillRect(0,0,W,H)
ctx.strokeStyle='rgba(227,73,237,.02)';ctx.lineWidth=0.5
for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

// ══ 亚海悬城布局 ══

// --- A 区 (右上) ---
wall(W*.58,0,W*.05,H*.36)           // A主隔墙
wall(W*.72,0,W*.05,H*.22)           // A短墙
area(W*.62,H*.04,W*.14,H*.16,'A 大厅') // A大厅
area(W*.63,H*.22,W*.14,H*.13,'A 后点') // A后点
box(W*.66,H*.14,22,45)
box(W*.74,H*.10,35,22)
cover(W*.68,H*.26,18)
site(W*.76,H*.24,'A','#ff4655')

// --- B 区 (左下) ---
wall(W*.12,H*.50,W*.10,H*.04)       // B上墙
wall(W*.10,H*.55,W*.04,H*.45)       // B左墙
wall(W*.22,H*.55,W*.04,H*.45)       // B右墙
area(W*.13,H*.56,W*.10,H*.14,'B 后点') // B后点
area(W*.24,H*.62,W*.12,H*.13,'市场')   // 市场
box(W*.18,H*.66,22,45)
box(W*.28,H*.68,35,22)
cover(W*.22,H*.72,18)
site(W*.25,H*.72,'B','#50b4f0')

// --- 中路 ---
wall(W*.50,H*.18,W*.04,H*.18)       // 中路隔墙上
wall(W*.50,H*.48,W*.04,H*.22)       // 中路隔墙下
area(W*.36,H*.30,W*.14,H*.14,'中厅') // 中厅
box(W*.46,H*.38,28,16)
cover(W*.48,H*.50,16)
box(W*.44,H*.58,24,36)

// --- 连接 ---
wall(W*.30,H*.40,W*.08,H*.04)       // A连墙
wall(W*.30,H*.60,W*.08,H*.04)       // B连墙
area(W*.31,H*.35,W*.07,H*.12)       // A连接
area(W*.31,H*.55,W*.07,H*.12)       // B连接

// --- 边路建筑 ---
area(W*.10,H*.18,W*.10,H*.10,'A 塔')
box(W*.72,H*.44,35,35)
box(W*.15,H*.36,30,30)

// --- 出生点 ---
spawn(W*.46,H*.05,'a');spawn(W*.46,H*.95,'a')
spawn(W*.72,H*.93,'d');spawn(W*.20,H*.93,'d')

// --- 标注 ---
label('A 门',W*.60,H*.40)
label('中门',W*.36,H*.46)
label('B 门',W*.42,H*.64)
label('中路',W*.48,H*.52)
label('阁楼',W*.38,H*.30)
label('A 塔',W*.15,H*.24)
label('市场',W*.30,H*.68)

// --- 外框 ---
ctx.strokeStyle='rgba(227,73,237,.22)';ctx.lineWidth=2.5;ctx.strokeRect(2,2,W-4,H-4)
ctx.strokeStyle='rgba(5,248,248,.07)';ctx.lineWidth=1;ctx.strokeRect(7,7,W-14,H-14)
ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,H-30,W,30)
ctx.strokeStyle='rgba(227,73,237,.12)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,H-30);ctx.lineTo(W,H-30);ctx.stroke()
ctx.fillStyle='rgba(5,248,248,.35)';ctx.font='12px "PingFang SC"';ctx.textAlign='left';ctx.fillText('亚海悬城 ASCENT · 旗舰版矢量战术地图',18,H-9)
ctx.fillStyle='rgba(227,73,237,.18)';ctx.textAlign='right';ctx.fillText('1800×1200 · 任意缩放不失真',W-18,H-9)
</script></body></html>
