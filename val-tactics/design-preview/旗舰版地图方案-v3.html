<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>旗舰版地图 V3 · 真实地图+旗舰风格</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#05020c;color:#b8b0c8;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;padding:20px}
h2{font-size:13px;letter-spacing:3px;color:rgba(227,73,237,.35)}
.row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.card canvas{border:1px solid rgba(227,73,237,.16);border-radius:10px;box-shadow:0 0 30px rgba(227,73,237,.06)}
.card p{font-size:10px;color:rgba(227,73,237,.25);text-align:center;margin-top:6px}
</style></head><body>
<h2>旗舰版战术地图 · 基于真实地图 + 旗舰风格覆盖</h2>
<div class="row" id="r"></div>
<script>
const maps=['ascent','bind','sunset']
const names={ascent:'亚海悬城',bind:'源工重镇',sunset:'日落之城'}
let loaded=0

maps.forEach(id=>{
  const img=new Image()
  img.onload=()=>{
    loaded++
    const W=900,H=600,c=document.createElement('canvas');c.width=W;c.height=H
    const ctx=c.getContext('2d'),w=W,h=H

    // 1. 暗底
    ctx.fillStyle='#060210';ctx.fillRect(0,0,w,h)

    // 2. 画真实地图（保持可见的细节）
    ctx.globalAlpha=.55
    ctx.drawImage(img,0,0,w,h)
    ctx.globalAlpha=1

    // 3. 暗角渐变（边缘变暗但不遮挡中心）
    const g=ctx.createRadialGradient(w*.5,h*.5,w*.08,w*.5,h*.5,w*.78)
    g.addColorStop(0,'transparent')
    g.addColorStop(.55,'transparent')
    g.addColorStop(1,'rgba(6,2,16,.75)')
    ctx.fillStyle=g;ctx.fillRect(0,0,w,h)

    // 4. 紫色微染
    ctx.fillStyle='rgba(20,8,40,.15)';ctx.fillRect(0,0,w,h)

    // 5. 网格叠加
    ctx.strokeStyle='rgba(227,73,237,.035)';ctx.lineWidth=0.4
    for(let x=0;x<w;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}
    for(let y=0;y<h;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}

    // 6. 外框
    ctx.strokeStyle='rgba(227,73,237,.2)';ctx.lineWidth=2;ctx.strokeRect(1,1,w-3,h-3)
    ctx.strokeStyle='rgba(5,248,248,.07)';ctx.lineWidth=1;ctx.strokeRect(4,4,w-9,h-9)

    // 7. 底部标注条
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,h-24,w,24)
    ctx.strokeStyle='rgba(227,73,237,.1)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,h-24);ctx.lineTo(w,h-24);ctx.stroke()
    ctx.fillStyle='rgba(5,248,248,.3)';ctx.font='10px "PingFang SC"';ctx.textAlign='left'
    ctx.fillText(names[id]+' · '+id.toUpperCase(),10,h-7)
    ctx.fillStyle='rgba(227,73,237,.15)';ctx.textAlign='right'
    ctx.fillText('旗舰版战术地图 · 1:1',w-10,h-7)

    // 添加到页面
    const wrap=document.createElement('div');wrap.className='card'
    const p=document.createElement('p');p.textContent=names[id]
    wrap.appendChild(c);wrap.appendChild(p)
    document.getElementById('r').appendChild(wrap)
  }
  img.src='/images/maps/'+id+'.png'
})
</script></body></html>
