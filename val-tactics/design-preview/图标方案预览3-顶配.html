<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>图标方案 · 顶配定制</title>
<style>body{background:#0a0612;color:#fff;font-family:'PingFang SC','Microsoft YaHei',sans-serif;padding:50px;display:flex;flex-wrap:wrap;gap:70px;justify-content:center;align-items:flex-start}
.card{text-align:center;width:200px}.card svg{border-radius:20px;box-shadow:0 0 50px rgba(0,0,0,.4);margin-bottom:14px;background:#0c0816}.card h3{font-size:14px;color:#ccc;margin:0 0 6px}.card p{font-size:11px;color:#666;margin:0;line-height:1.5}</style></head><body>

<div class="card"><h3>N · 晶核棱镜</h3>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="160" height="160">
<defs><linearGradient id="n1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E349ED"/><stop offset="50%" stop-color="#c835d8"/><stop offset="100%" stop-color="#05F8F8"/></linearGradient>
<linearGradient id="n2" x1="100%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#f0a0ff"/><stop offset="100%" stop-color="#05F8F8"/></linearGradient></defs>
<rect width="120" height="120" rx="24" fill="#0a0612"/>
<polygon points="60,12 105,38 105,82 60,108 15,82 15,38" fill="none" stroke="url(#n1)" stroke-width="2"/>
<polygon points="60,24 93,44 93,76 60,96 27,76 27,44" fill="url(#n1)" opacity=".12"/>
<polygon points="60,12 105,38 60,64 15,38" fill="url(#n2)" opacity=".25"/>
<polygon points="60,64 105,38 105,82" fill="url(#n2)" opacity=".08"/>
<polygon points="60,64 15,38 15,82" fill="url(#n1)" opacity=".15"/>
<text x="60" y="72" text-anchor="middle" font-family="Georgia,serif" font-size="28" font-weight="900" fill="url(#n2)">V</text>
</svg><p>晶核棱镜切割 · 三维立体 · 高级珠宝质感</p></div>

<div class="card"><h3>O · 能量核心</h3>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="160" height="160">
<defs><linearGradient id="o1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E349ED"/><stop offset="100%" stop-color="#05F8F8"/></linearGradient>
<radialGradient id="o2" cx="50%" cy="50%"><stop offset="0%" stop-color="#E349ED" stop-opacity=".4"/><stop offset="50%" stop-color="#E349ED" stop-opacity=".1"/><stop offset="100%" stop-color="transparent"/></radialGradient></defs>
<rect width="120" height="120" rx="26" fill="#0a0612"/>
<circle cx="60" cy="60" r="45" fill="url(#o2)"/>
<circle cx="60" cy="60" r="32" fill="none" stroke="url(#o1)" stroke-width="1.5" opacity=".4"/>
<circle cx="60" cy="60" r="22" fill="none" stroke="url(#o1)" stroke-width="2" opacity=".7"/>
<circle cx="60" cy="60" r="10" fill="url(#o1)"/>
<polygon points="60,28 68,52 92,52 74,66 82,92 60,76 38,92 46,66 28,52 52,52" fill="url(#o1)" opacity=".85"/>
</svg><p>能量核心爆发 · 星形标识 · 极具辨识度</p></div>

<div class="card"><h3>P · 折纸飞翼</h3>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="160" height="160">
<defs><linearGradient id="p1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E349ED"/><stop offset="100%" stop-color="#05F8F8"/></linearGradient></defs>
<rect width="120" height="120" rx="24" fill="#0a0612"/>
<polygon points="60,10 100,80 60,100 20,80" fill="none" stroke="url(#p1)" stroke-width="2.5" stroke-linejoin="round"/>
<polygon points="60,10 80,50 60,70 40,50" fill="url(#p1)" opacity=".35"/>
<polygon points="60,70 100,80 60,100" fill="url(#p1)" opacity=".2"/>
<polygon points="60,70 20,80 60,100" fill="url(#p1)" opacity=".08"/>
<circle cx="60" cy="52" r="6" fill="url(#p1)"/>
</svg><p>折纸飞翼 · 几何美学 · 独一无二</p></div>

<div class="card"><h3>Q · 战术鹰徽</h3>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="160" height="160">
<defs><linearGradient id="q1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E349ED"/><stop offset="100%" stop-color="#05F8F8"/></linearGradient></defs>
<rect width="120" height="120" rx="24" fill="#0a0612"/>
<polygon points="60,12 78,40 60,35 42,40" fill="url(#q1)" opacity=".3"/>
<polygon points="60,35 90,80 60,65 30,80" fill="none" stroke="url(#q1)" stroke-width="2.5" stroke-linejoin="round"/>
<polygon points="60,35 72,60 60,55 48,60" fill="url(#q1)" opacity=".5"/>
<circle cx="60" cy="50" r="5" fill="url(#q1)"/>
<rect x="52" y="70" width="16" height="3" rx="1.5" fill="url(#q1)" opacity=".6"/>
<rect x="50" y="78" width="20" height="3" rx="1.5" fill="url(#q1)" opacity=".4"/>
</svg><p>战术鹰徽 · 力量感 · 庄重典雅</p></div>

<div class="card"><h3>R · 破碎重组</h3>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="160" height="160">
<defs><linearGradient id="r1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E349ED"/><stop offset="100%" stop-color="#05F8F8"/></linearGradient></defs>
<rect width="120" height="120" rx="24" fill="#0a0612"/>
<rect x="22" y="24" width="30" height="30" rx="7" fill="none" stroke="url(#r1)" stroke-width="2" transform="rotate(-12,37,39)"/>
<rect x="38" y="20" width="30" height="30" rx="7" fill="url(#r1)" opacity=".25" transform="rotate(5,53,35)"/>
<rect x="30" y="40" width="28" height="28" rx="7" fill="none" stroke="url(#r1)" stroke-width="2" transform="rotate(-3,44,54)"/>
<rect x="48" y="38" width="26" height="26" rx="7" fill="url(#r1)" opacity=".35" transform="rotate(10,61,51)"/>
<rect x="62" y="56" width="24" height="24" rx="7" fill="none" stroke="url(#r1)" stroke-width="2" transform="rotate(-8,74,68)"/>
<text x="58" y="70" text-anchor="middle" font-family="Arial" font-size="20" font-weight="900" fill="#fff" transform="rotate(-3,58,66)">T</text>
</svg><p>破碎重组 · 解构主义 · 艺术感</p></div>

<div class="card"><h3>S · 光之隧道</h3>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="160" height="160">
<defs><linearGradient id="s1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E349ED"/><stop offset="100%" stop-color="#05F8F8"/></linearGradient></defs>
<rect width="120" height="120" rx="26" fill="#0a0612"/>
<rect x="20" y="20" width="80" height="80" rx="16" fill="none" stroke="url(#s1)" stroke-width="1.5" opacity=".2"/>
<rect x="28" y="28" width="64" height="64" rx="12" fill="none" stroke="url(#s1)" stroke-width="1.5" opacity=".35"/>
<rect x="36" y="36" width="48" height="48" rx="8" fill="none" stroke="url(#s1)" stroke-width="2" opacity=".6"/>
<rect x="44" y="44" width="32" height="32" rx="5" fill="url(#s1)" opacity=".15"/>
<polygon points="60,44 52,58 60,54 68,58" fill="url(#s1)"/>
</svg><p>光之隧道 · 无限景深 · 科技前沿</p></div>
</body></html>
