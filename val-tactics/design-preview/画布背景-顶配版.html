<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>画布背景 · 顶配旗舰版</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#05020c;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:10px;padding:20px}
h2{font-size:12px;letter-spacing:3px;color:rgba(5,248,248,.3)}
.canvas{width:900px;height:600px;border:1px solid rgba(227,73,237,.16);border-radius:12px;position:relative;overflow:hidden;background:#050210}
.map{position:absolute;top:10%;left:10%;width:80%;height:80%;border-radius:12px;background:rgba(12,6,22,.5);border:1px solid rgba(227,73,237,.12);z-index:2;box-shadow:0 0 80px rgba(227,73,237,.06),inset 0 0 100px rgba(5,248,248,.02),0 0 0 20px rgba(5,2,16,.8)}
.map::before{content:'';position:absolute;inset:-2px;border-radius:14px;border:1px solid rgba(5,248,248,.08);pointer-events:none;animation:mapEdge 4s ease-in-out infinite}
@keyframes mapEdge{0%,100%{border-color:rgba(5,248,248,.06)}50%{border-color:rgba(227,73,237,.12)}}
/* 地图光晕 */
.map::after{content:'';position:absolute;inset:-40px;border-radius:50px;background:radial-gradient(ellipse at center,rgba(227,73,237,.04),transparent 70%);pointer-events:none;animation:mapGlow 6s ease-in-out infinite}
@keyframes mapGlow{0%,100%{opacity:.5}50%{opacity:1}}

/* 四角装饰 */
.corner{position:absolute;z-index:1;pointer-events:none}
.corner::before,.corner::after{content:'';position:absolute;background:rgba(5,248,248,.15)}
.cornerTL{top:18px;left:18px}.cornerTL::before{width:40px;height:1px;top:0;left:0}.cornerTL::after{width:1px;height:40px;top:0;left:0}
.cornerTR{top:18px;right:18px}.cornerTR::before{width:40px;height:1px;top:0;right:0}.cornerTR::after{width:1px;height:40px;top:0;right:0}
.cornerBL{bottom:18px;left:18px}.cornerBL::before{width:40px;height:1px;bottom:0;left:0}.cornerBL::after{width:1px;height:40px;bottom:0;left:0}
.cornerBR{bottom:18px;right:18px}.cornerBR::before{width:40px;height:1px;bottom:0;right:0}.cornerBR::after{width:1px;height:40px;bottom:0;right:0}
.cornerDot{position:absolute;width:6px;height:6px;border-radius:50%;background:#05F8F8;box-shadow:0 0 10px #05F8F8;animation:dotPulseC 2.5s ease-in-out infinite}
@keyframes dotPulseC{0%,100%{box-shadow:0 0 8px #05F8F8,0 0 16px rgba(5,248,248,.3)}50%{box-shadow:0 0 16px #05F8F8,0 0 30px rgba(5,248,248,.6)}}

/* 涟漪环 */
.ripple{position:absolute;border-radius:50%;border:1px solid rgba(5,248,248,.15);pointer-events:none;z-index:0;animation:rippleOut 8s ease-out infinite}

/* 扫描光环 */
.halo{position:absolute;top:50%;left:50%;width:300px;height:300px;border-radius:50%;border:1px solid rgba(227,73,237,.08);transform:translate(-50%,-50%) rotateX(60deg);pointer-events:none;z-index:0;animation:haloSpin 20s linear infinite,haloPulse 4s ease-in-out infinite}
.halo2{position:absolute;top:50%;left:50%;width:450px;height:450px;border-radius:50%;border:1px solid rgba(5,248,248,.05);transform:translate(-50%,-50%) rotateX(60deg);pointer-events:none;z-index:0;animation:haloSpin 25s linear infinite reverse,haloPulse 5s ease-in-out infinite 1s}
@keyframes haloSpin{to{transform:translate(-50%,-50%) rotateX(60deg) rotateZ(360deg)}}
@keyframes haloPulse{0%,100%{opacity:.3}50%{opacity:.7}}

/* 粒子线 */
.trail{position:absolute;height:1px;pointer-events:none;z-index:0;background:linear-gradient(90deg,transparent,rgba(5,248,248,.2),transparent);animation:trailDrift 12s ease-in-out infinite}
</style></head><body>
<h2>画布背景 · 顶配旗舰版</h2>
<div class="canvas" id="c">
  <!-- 四角装饰 -->
  <div class="corner cornerTL"><div class="cornerDot" style="top:-3px;left:-3px"></div></div>
  <div class="corner cornerTR"><div class="cornerDot" style="top:-3px;right:-3px"></div></div>
  <div class="corner cornerBL"><div class="cornerDot" style="bottom:-3px;left:-3px"></div></div>
  <div class="corner cornerBR"><div class="cornerDot" style="bottom:-3px;right:-3px"></div></div>
  <div class="map"></div>
</div>
<script>
const cnv=document.getElementById('c')

// 底光
const bg=document.createElement('div');bg.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 500px 350px at 55% 12%,rgba(227,73,237,.08),transparent 60%),radial-gradient(ellipse 350px 250px at 8% 85%,rgba(5,248,248,.04),transparent 55%),radial-gradient(ellipse 300px 200px at 88% 68%,rgba(227,73,237,.05),transparent 50%);animation:bgBreath 10s ease-in-out infinite alternate'
cnv.appendChild(bg)

// 蜂巢网格
const hex=document.createElement('div');hex.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.4;background-image:radial-gradient(circle at 50% 50%,rgba(227,73,237,.06) 1px,transparent 1px);background-size:30px 30px'
cnv.appendChild(hex)

// 涟漪环
for(let i=0;i<3;i++){
  const r=document.createElement('div');r.className='ripple'
  r.style.cssText=`top:${40+Math.random()*20}%;left:${40+Math.random()*20}%;width:${100+i*80}px;height:${100+i*80}px;margin-left:-${(100+i*80)/2}px;margin-top:-${(100+i*80)/2}px;animation-delay:${i*3}s`
  cnv.appendChild(r)
}

// 扫描光环
const h1=document.createElement('div');h1.className='halo';cnv.appendChild(h1)
const h2=document.createElement('div');h2.className='halo2';cnv.appendChild(h2)

// 流动粒子线
for(let i=0;i<5;i++){
  const t=document.createElement('div');t.className='trail'
  t.style.cssText=`top:${10+Math.random()*80}%;left:${Math.random()*20}%;width:${100+Math.random()*200}px;animation-delay:${i*2.5}s;animation-duration:${10+Math.random()*8}s`
  cnv.appendChild(t)
}

// 微粒子
const ps=['rgba(5,248,248,.35)','rgba(227,73,237,.3)','rgba(180,220,255,.25)']
for(let i=0;i<25;i++){
  const p=document.createElement('div');p.style.cssText=`position:absolute;pointer-events:none;z-index:0;width:${1+Math.random()*3}px;height:${1+Math.random()*3}px;border-radius:50%;background:${ps[i%3]};box-shadow:0 0 ${4+Math.random()*8}px ${ps[i%3]};top:${Math.random()*90}%;left:${Math.random()*90}%;animation:particleFloat ${6+Math.random()*10}s ease-in-out ${Math.random()*6}s infinite`
  cnv.appendChild(p)
}
</script>
<style>
@keyframes bgBreath{0%{opacity:.6}100%{opacity:1}}
@keyframes rippleOut{0%{opacity:0;transform:scale(.6)}20%{opacity:.4}100%{opacity:0;transform:scale(2)}}
@keyframes particleFloat{0%,100%{opacity:.1;transform:translate(0,0)}50%{opacity:.5;transform:translate(6px,-10px)}}
@keyframes trailDrift{0%,100%{opacity:.1;transform:translateX(0)}50%{opacity:.4;transform:translateX(40px)}}
</style></body></html>
