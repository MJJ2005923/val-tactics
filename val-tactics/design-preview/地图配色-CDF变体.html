<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>C/D/F 配色变体</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#05020c;color:#b8b0c8;display:flex;flex-direction:column;align-items:center;min-height:100vh;gap:8px;padding:20px}
h2{font-size:11px;letter-spacing:3px;color:rgba(5,248,248,.3)}h3{font-size:10px;color:rgba(227,73,237,.2);margin:10px 0 4px}
.row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.card{text-align:center}.card p{font-size:9px;color:rgba(227,73,237,.2);margin-top:3px}
canvas{border:1px solid rgba(227,73,237,.16);border-radius:6px}
</style></head><body><h2>AS 亚海悬城 · C/D/F 配色变体</h2><div id="app"></div>
<script>
const W=600,H=400,app=document.getElementById('app')
const img=new Image()
img.onload=function(){
  const c0=document.createElement('canvas');c0.width=img.naturalWidth;c0.height=img.naturalHeight
  const ctx0=c0.getContext('2d');ctx0.drawImage(img,0,0)
  const src=ctx0.getImageData(0,0,c0.width,c0.height).data
  const iw=c0.width,ih=c0.height

  function makeScheme(name,fn){
    const cv=document.createElement('canvas');cv.width=W;cv.height=H;const cx=cv.getContext('2d'),out=cx.createImageData(W,H)
    for(let y=0;y<H;y++)for(let x=0;x<W;x++){
      const si=(Math.floor(y*ih/H)*iw+Math.floor(x*iw/W))*4
      const gray=(src[si]+src[si+1]+src[si+2])/3,di=(y*W+x)*4
      const rgb=fn(gray)
      out.data[di]=rgb[0];out.data[di+1]=rgb[1];out.data[di+2]=rgb[2];out.data[di+3]=255
    }
    cx.putImageData(out,0,0)
    const g=cx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,W*.7)
    g.addColorStop(0,'transparent');g.addColorStop(.5,'transparent');g.addColorStop(1,'rgba(5,2,14,.4)')
    cx.fillStyle=g;cx.fillRect(0,0,W,H)
    cx.strokeStyle='rgba(227,73,237,.15)';cx.lineWidth=1.5;cx.strokeRect(1,1,W-2,H-2)
    const d=document.createElement('div');d.className='card';d.appendChild(cv)
    const p=document.createElement('p');p.textContent=name;d.appendChild(p)
    return d
  }

  function group(title,list){
    const h=document.createElement('h3');h.textContent=title;app.appendChild(h)
    const r=document.createElement('div');r.className='row';list.forEach(i=>r.appendChild(i));app.appendChild(r)
  }

  // 粉色 = high R + mid-low G + mid-high B. 青色 = low R + high G + high B
  group('C系 · 暗底+粉墙+青空地',[
    makeScheme('C1 亮粉锐线',g=>g<40?[4,2,10]:g<100?[(t=(g-40)/60,Math.floor(250+t*5)),Math.floor(80+t*20),Math.floor(200+t*30)]:g<180?[(t=(g-100)/80,Math.floor(5+t*10)),Math.floor(60+t*130),Math.floor(80+t*140)]:(t=(g-180)/75,[Math.floor(8+t*10),Math.floor(200+t*40),Math.floor(230+t*20)])]),
    makeScheme('C2 柔和粉线',g=>g<35?[3,1,9]:g<95?[(t=(g-35)/60,Math.floor(230+t*10)),Math.floor(90+t*30),Math.floor(210+t*30)]:(t=(g-95)/160,[Math.floor(5+t*18),Math.floor(80+t*130),Math.floor(100+t*120)])]),
    makeScheme('C3 淡粉+暗底',g=>g<50?[5,2,12]:g<110?[(t=(g-50)/60,Math.floor(210+t*20),Math.floor(60+t*30),Math.floor(190+t*30)]:g<180?[(t=(g-110)/70,Math.floor(4+t*6),Math.floor(25+t*30),Math.floor(35+t*40)]:(t=(g-180)/75,[Math.floor(6+t*8),Math.floor(120+t*60),Math.floor(140+t*60)])]),
  ])

  group('D系 · 灰黑底+粉边+青高亮',[
    makeScheme('D1 粉边青高亮',g=>g<50?[6,3,14]:g<100?[(t=(g-50)/50,Math.floor(240+t*10)),Math.floor(50+t*50),Math.floor(210+t*20)]:g<170?[(t=(g-100)/70,Math.floor(8+t*5),Math.floor(18+t*10),Math.floor(35+t*15))]:(t=(g-170)/85,[Math.floor(5+t*8),Math.floor(160+t*60),Math.floor(180+t*50)])]),
    makeScheme('D2 偏粉暗底',g=>g<55?[5,2,11]:g<105?[(t=(g-55)/50,Math.floor(245+t*8),Math.floor(70+t*40),Math.floor(215+t*25)]:g<175?[(t=(g-105)/70,Math.floor(6+t*4),Math.floor(12+t*8),Math.floor(22+t*10))]:(t=(g-175)/80,[Math.floor(4+t*6),Math.floor(140+t*60),Math.floor(160+t*50)])]),
    makeScheme('D3 亮青粉细线',g=>g<45?[5,2,10]:g<95?[(t=(g-45)/50,Math.floor(235+t*12),Math.floor(60+t*35),Math.floor(215+t*25)]:g<165?[(t=(g-95)/70,Math.floor(5+t*4),Math.floor(30+t*20),Math.floor(40+t*25))]:(t=(g-165)/90,[Math.floor(5+t*12),Math.floor(185+t*50),Math.floor(205+t*35)])]),
  ])

  group('F系 · 深暗底+粉墙+青空地',[
    makeScheme('F1 粉墙青空地',g=>g<45?[4,1,12]:g<110?[(t=(g-45)/65,Math.floor(240+t*10),Math.floor(80+t*50),Math.floor(220+t*20)]:(t=(g-110)/145,[Math.floor(5+t*12),Math.floor(110+t*110),Math.floor(120+t*110)])]),
    makeScheme('F2 高对比亮粉',g=>g<40?[3,1,10]:g<100?[(t=(g-40)/60,Math.floor(250+t*3),Math.floor(70+t*60),Math.floor(230+t*15)]:(t=(g-100)/155,[Math.floor(4+t*10),Math.floor(130+t*100),Math.floor(140+t*100)])]),
    makeScheme('F3 柔粉淡青',g=>g<50?[5,2,13]:g<115?[(t=(g-50)/65,Math.floor(230+t*15),Math.floor(80+t*35),Math.floor(210+t*30)]:(t=(g-115)/140,[Math.floor(8+t*8),Math.floor(70+t*90),Math.floor(80+t*100)])]),
  ])
}
img.onerror=function(){app.textContent='图片加载失败 — 把文件放到 public/images/maps-clean/ascent.png'}
img.src='/images/maps-clean/ascent.png'
</script></body></html>
