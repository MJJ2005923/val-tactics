<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>旗舰版地图 · 色调映射 V2</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#05020c;color:#b8b0c8;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;padding:20px}
h2{font-size:13px;letter-spacing:3px;color:rgba(5,248,248,.35)}.row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.card{text-align:center}.card p{font-size:10px;color:rgba(227,73,237,.25);margin-top:6px}
canvas{border:1px solid rgba(227,73,237,.18);border-radius:10px;box-shadow:0 0 30px rgba(227,73,237,.06)}
</style></head><body><h2>旗舰版战术地图</h2><div class="row" id="r"></div>
<script>
const maps=['ascent','bind','sunset','split','pearl','haven','icebox','lotus','breeze','fracture','abyss','saltmine']
const names={ascent:'亚海悬城',bind:'源工重镇',sunset:'日落之城',split:'霓虹町',pearl:'深海明珠',haven:'隐士修所',icebox:'森寒冬港',lotus:'莲华古城',breeze:'微风岛屿',fracture:'裂变峡谷',abyss:'幽邃地窖',saltmine:'盐海矿镇'}

maps.forEach(id=>{
  const img=new Image()
  img.onload=()=>{
    const iw=img.naturalWidth,ih=img.naturalHeight,W=1800,H=1200
    const tc=document.createElement('canvas');tc.width=iw;tc.height=ih;tctx=tc.getContext('2d');tctx.drawImage(img,0,0)
    const src=tctx.getImageData(0,0,iw,ih).data
    const c=document.createElement('canvas');c.width=W;c.height=H;const ctx=c.getContext('2d')
    const out=ctx.createImageData(W,H)

    for(let y=0;y<H;y++)for(let x=0;x<W;x++){
      const sx=Math.floor(x*iw/W),sy=Math.floor(y*ih/H),si=(sy*iw+sx)*4,di=(y*W+x)*4
      const r=src[si],g=src[si+1],b=src[si+2],gray=(r+g+b)/3

      // 旗舰版四层色调
      if(gray<25){                          // 最暗 → 深黑紫底
        out.data[di]=5;out.data[di+1]=2;out.data[di+2]=14;out.data[di+3]=255
      }else if(gray<70){                    // 暗 → 深紫墙
        const t=gray/70;out.data[di]=Math.floor(28+t*15);out.data[di+1]=Math.floor(10+t*8);out.data[di+2]=Math.floor(45+t*20);out.data[di+3]=255
      }else if(gray<130){                   // 中 → 紫色建筑/通道
        const t=(gray-70)/60;out.data[di]=Math.floor(55+t*30);out.data[di+1]=Math.floor(18+t*12);out.data[di+2]=Math.floor(75+t*35);out.data[di+3]=255
      }else if(gray<190){                   // 浅灰 → 暗青紫过渡
        const t=(gray-130)/60;out.data[di]=Math.floor(25+t*20);out.data[di+1]=Math.floor(10+t*15);out.data[di+2]=Math.floor(35+t*30);out.data[di+3]=255
      }else{                                // 亮 → 淡青
        const t=(gray-190)/65
        if(r>180&&g>150&&b<100){             // 黄色标记 → 青色
          out.data[di]=Math.floor(5+t*10);out.data[di+1]=Math.floor(140+t*60);out.data[di+2]=Math.floor(180+t*40);out.data[di+3]=255
        }else{                               // 普通亮区
          out.data[di]=Math.floor(45+t*20);out.data[di+1]=Math.floor(18+t*10);out.data[di+2]=Math.floor(60+t*20);out.data[di+3]=255
        }
      }
    }
    ctx.putImageData(out,0,0)

    // 网格
    ctx.strokeStyle='rgba(227,73,237,.025)';ctx.lineWidth=0.4
    for(let x=0;x<W;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
    for(let y=0;y<H;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

    // 暗角
    const g=ctx.createRadialGradient(W*.5,H*.5,W*.06,W*.5,H*.5,W*.73)
    g.addColorStop(0,'transparent');g.addColorStop(.5,'transparent');g.addColorStop(1,'rgba(5,2,14,.6)')
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H)

    // 外框
    ctx.strokeStyle='rgba(227,73,237,.2)';ctx.lineWidth=2;ctx.strokeRect(2,2,W-4,H-4)
    ctx.strokeStyle='rgba(5,248,248,.06)';ctx.lineWidth=1;ctx.strokeRect(7,7,W-14,H-14)

    // 底部条
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,H-26,W,26)
    ctx.strokeStyle='rgba(227,73,237,.08)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,H-26);ctx.lineTo(W,H-26);ctx.stroke()
    ctx.fillStyle='rgba(5,248,248,.3)';ctx.font='10px "PingFang SC"';ctx.textAlign='left';ctx.fillText(names[id],10,H-7)
    ctx.fillStyle='rgba(227,73,237,.12)';ctx.textAlign='right';ctx.fillText('旗舰版',W-10,H-7)

    const wrap=document.createElement('div');wrap.className='card';wrap.appendChild(c)
    const p=document.createElement('p');p.textContent=names[id];wrap.appendChild(p)
    document.getElementById('r').appendChild(wrap)
  }
  img.src='/images/maps-clean/'+id+'.png'
})
</script></body></html>
