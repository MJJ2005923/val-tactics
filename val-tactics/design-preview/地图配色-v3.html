<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>配色方案 v3</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#05020c;color:#b8b0c8;display:flex;flex-direction:column;align-items:center;min-height:100vh;gap:8px;padding:20px}
h2{font-size:11px;letter-spacing:3px;color:rgba(5,248,248,.3)}h3{font-size:10px;color:rgba(227,73,237,.2);margin:10px 0 4px}
.row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.card{text-align:center}.card p{font-size:9px;color:rgba(227,73,237,.2);margin-top:3px}
canvas{border:1px solid rgba(227,73,237,.16);border-radius:6px}
</style></head><body><h2>AS 亚海悬城</h2><div id="app"></div>
<script>
var W=600,H=400,app=document.getElementById('app')
var img=new Image()
img.onload=function(){
  var c0=document.createElement('canvas');c0.width=img.naturalWidth;c0.height=img.naturalHeight
  var ctx0=c0.getContext('2d');ctx0.drawImage(img,0,0)
  var src=ctx0.getImageData(0,0,c0.width,c0.height).data,iw=c0.width,ih=c0.height

  function makeCanvas(fn){
    var cv=document.createElement('canvas');cv.width=W;cv.height=H;var cx=cv.getContext('2d'),out=cx.createImageData(W,H)
    for(var y=0;y<H;y++)for(var x=0;x<W;x++){
      var si=(Math.floor(y*ih/H)*iw+Math.floor(x*iw/W))*4,gray=(src[si]+src[si+1]+src[si+2])/3,di=(y*W+x)*4
      var rgb=fn(gray)
      out.data[di]=rgb[0];out.data[di+1]=rgb[1];out.data[di+2]=rgb[2];out.data[di+3]=255
    }
    cx.putImageData(out,0,0)
    var g2=cx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,W*.7)
    g2.addColorStop(0,'transparent');g2.addColorStop(.5,'transparent');g2.addColorStop(1,'rgba(5,2,14,.4)')
    cx.fillStyle=g2;cx.fillRect(0,0,W,H)
    cx.strokeStyle='rgba(227,73,237,.15)';cx.lineWidth=1.5;cx.strokeRect(1,1,W-2,H-2)
    return cv
  }

  function card(name,cv){
    var d=document.createElement('div');d.className='card';d.appendChild(cv);var p=document.createElement('p');p.textContent=name;d.appendChild(p);return d
  }

  function addGroup(title,list){
    var h=document.createElement('h3');h.textContent=title;app.appendChild(h)
    var r=document.createElement('div');r.className='row';list.forEach(function(i){r.appendChild(i)});app.appendChild(r)
  }

  // C系: 暗底+粉墙+青空地
  addGroup('C系 · 暗底+粉墙+青空地',[
    card('C1 亮粉',makeCanvas(function(g){if(g<40)return[4,2,10];if(g<100){var t=(g-40)/60;return[Math.floor(250+t*5),Math.floor(80+t*20),Math.floor(200+t*30)]}if(g<180){var t=(g-100)/80;return[Math.floor(5+t*10),Math.floor(60+t*130),Math.floor(80+t*140)]}var t=(g-180)/75;return[Math.floor(8+t*10),Math.floor(200+t*40),Math.floor(230+t*20)]})),
    card('C2 柔粉',makeCanvas(function(g){if(g<35)return[3,1,9];if(g<95){var t=(g-35)/60;return[Math.floor(230+t*20),Math.floor(90+t*30),Math.floor(210+t*30)]}var t=(g-95)/160;return[Math.floor(5+t*20),Math.floor(80+t*140),Math.floor(100+t*130)]})),
    card('C3 淡粉',makeCanvas(function(g){if(g<50)return[5,2,12];if(g<110){var t=(g-50)/60;return[Math.floor(210+t*20),Math.floor(60+t*30),Math.floor(190+t*30)]}if(g<180){var t=(g-110)/70;return[Math.floor(4+t*6),Math.floor(25+t*30),Math.floor(35+t*40)]}var t=(g-180)/75;return[Math.floor(6+t*10),Math.floor(120+t*60),Math.floor(140+t*60)]})),
  ])

  // D系: 灰黑底+粉边+青高亮
  addGroup('D系 · 灰黑底+粉边+青高亮',[
    card('D1 粉边',makeCanvas(function(g){if(g<50)return[6,3,14];if(g<100){var t=(g-50)/50;return[Math.floor(240+t*10),Math.floor(50+t*50),Math.floor(210+t*25)]}if(g<170){var t=(g-100)/70;return[Math.floor(8+t*5),Math.floor(18+t*10),Math.floor(35+t*15)]}var t=(g-170)/85;return[Math.floor(5+t*10),Math.floor(160+t*60),Math.floor(180+t*50)]})),
    card('D2 偏粉',makeCanvas(function(g){if(g<55)return[5,2,11];if(g<105){var t=(g-55)/50;return[Math.floor(245+t*8),Math.floor(70+t*40),Math.floor(215+t*25)]}if(g<175){var t=(g-105)/70;return[Math.floor(6+t*4),Math.floor(12+t*8),Math.floor(22+t*10)]}var t=(g-175)/80;return[Math.floor(4+t*8),Math.floor(140+t*60),Math.floor(160+t*50)]})),
    card('D3 亮青',makeCanvas(function(g){if(g<45)return[5,2,10];if(g<95){var t=(g-45)/50;return[Math.floor(235+t*12),Math.floor(60+t*35),Math.floor(215+t*25)]}if(g<165){var t=(g-95)/70;return[Math.floor(5+t*4),Math.floor(30+t*20),Math.floor(40+t*25)]}var t=(g-165)/90;return[Math.floor(5+t*15),Math.floor(185+t*50),Math.floor(205+t*35)]})),
  ])

  // F系: 深暗底+粉墙+青空地
  addGroup('F系 · 深暗底+粉墙+青空地',[
    card('F1 粉墙',makeCanvas(function(g){if(g<45)return[4,1,12];if(g<110){var t=(g-45)/65;return[Math.floor(240+t*10),Math.floor(80+t*50),Math.floor(220+t*20)]}var t=(g-110)/145;return[Math.floor(5+t*15),Math.floor(110+t*110),Math.floor(120+t*110)]})),
    card('F2 亮粉',makeCanvas(function(g){if(g<40)return[3,1,10];if(g<100){var t=(g-40)/60;return[Math.floor(250+t*3),Math.floor(70+t*60),Math.floor(230+t*15)]}var t=(g-100)/155;return[Math.floor(4+t*12),Math.floor(130+t*100),Math.floor(140+t*100)]})),
    card('F3 柔粉',makeCanvas(function(g){if(g<50)return[5,2,13];if(g<115){var t=(g-50)/65;return[Math.floor(230+t*15),Math.floor(80+t*35),Math.floor(210+t*30)]}var t=(g-115)/140;return[Math.floor(8+t*10),Math.floor(70+t*90),Math.floor(80+t*100)]})),
  ])
}
img.src='/images/maps-clean/ascent.png'
</script></body></html>
