<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>图标方案 第二组</title>
<style>body{background:#0a0612;color:#fff;font-family:'PingFang SC','Microsoft YaHei',sans-serif;padding:40px;display:flex;flex-wrap:wrap;gap:60px;justify-content:center;align-items:flex-start}
.card{text-align:center;width:180px}.card svg{border-radius:16px;box-shadow:0 0 40px rgba(0,0,0,.3);margin-bottom:12px;background:#0d0818}.card h3{font-size:13px;color:#888;margin:0 0 4px}.card p{font-size:11px;color:#555;margin:0}</style></head><body>

<div class="card"><h3>G · 双V交叉</h3>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="120" height="120"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E349ED"/><stop offset="100%" stop-color="#05F8F8"/></linearGradient></defs><rect width="80" height="80" rx="18" fill="#0a0612"/><text x="40" y="56" text-anchor="middle" font-family="Arial" font-size="42" font-weight="900" fill="url(#g)" opacity=".6">V</text><text x="36" y="56" text-anchor="middle" font-family="Arial" font-size="42" font-weight="900" fill="url(#g)">V</text></svg>
<p>双 V 层叠 · 立体感</p></div>

<div class="card"><h3>H · 发射轨道</h3>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="120" height="120"><defs><linearGradient id="h" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E349ED"/><stop offset="100%" stop-color="#05F8F8"/></linearGradient></defs><rect width="80" height="80" rx="18" fill="#0a0612"/><circle cx="40" cy="40" r="28" fill="none" stroke="url(#h)" stroke-width="1.5" opacity=".3"/><circle cx="40" cy="40" r="18" fill="none" stroke="url(#h)" stroke-width="2" opacity=".6"/><circle cx="40" cy="40" r="7" fill="url(#h)"/><line x1="40" y1="40" x2="68" y2="12" stroke="url(#h)" stroke-width="2.5" stroke-linecap="round"/></svg>
<p>轨道发射 · 动感</p></div>

<div class="card"><h3>I · 蜂巢六角</h3>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="120" height="120"><defs><linearGradient id="i" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#E349ED"/><stop offset="100%" stop-color="#05F8F8"/></linearGradient></defs><rect width="80" height="80" rx="16" fill="#0a0612"/><polygon points="40,8 67,24 67,56 40,72 13,56 13,24" fill="none" stroke="url(#i)" stroke-width="2.5"/><polygon points="40,18 58,29 58,51 40,62 22,51 22,29" fill="url(#i)" opacity=".3"/><text x="40" y="48" text-anchor="middle" font-family="Arial" font-size="24" font-weight="900" fill="#fff">T</text></svg>
<p>六角蜂巢 · 科技感</p></div>

<div class="card"><h3>J · 护盾 V</h3>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="120" height="120"><defs><linearGradient id="j" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#E349ED"/><stop offset="100%" stop-color="#05F8F8"/></linearGradient></defs><rect width="80" height="80" rx="18" fill="#0a0612"/><path d="M40 8 L66 28 L66 52 C66 60 50 72 40 72 C30 72 14 60 14 52 L14 28 Z" fill="none" stroke="url(#j)" stroke-width="2.5"/><text x="40" y="52" text-anchor="middle" font-family="Arial" font-size="28" font-weight="900" fill="url(#j)">V</text></svg>
<p>护盾 V · 安全可靠</p></div>

<div class="card"><h3>K · 雷达扫描</h3>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="120" height="120"><defs><linearGradient id="k" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E349ED"/><stop offset="100%" stop-color="#05F8F8"/></linearGradient></defs><rect width="80" height="80" rx="18" fill="#0a0612"/><circle cx="40" cy="40" r="30" fill="none" stroke="url(#k)" stroke-width="1" opacity=".3"/><circle cx="40" cy="40" r="20" fill="none" stroke="url(#k)" stroke-width="1" opacity=".5"/><circle cx="40" cy="40" r="10" fill="none" stroke="url(#k)" stroke-width="1" opacity=".7"/><path d="M40 40 L40 12 A28 28 0 0 1 62 52 Z" fill="url(#k)" opacity=".15"/><circle cx="40" cy="40" r="4" fill="url(#k)"/></svg>
<p>雷达扫描 · 战术侦察</p></div>

<div class="card"><h3>L · 像素 V</h3>

<p>像素艺术 · 复古游戏</p></div>
</body></html>
