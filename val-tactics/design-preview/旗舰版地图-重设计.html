<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>旗舰版地图 · 重设计</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#05020c;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:10px;padding:20px}
canvas{border:1px solid rgba(227,73,237,.18);border-radius:10px;box-shadow:0 0 30px rgba(227,73,237,.06)}
p{font-size:10px;color:rgba(227,73,237,.2)}
</style></head><body>
<canvas id="c" width="1800" height="1200"></canvas>
<p>亚海悬城 ASCENT · 旗舰版</p>
<script>
var W=1800,H=1200,img=new Image()
img.onload=function(){
  var iw=img.naturalWidth,ih=img.naturalHeight,ctx=document.getElementById('c').getContext('2d')

  // 1. 画布背景
  ctx.fillStyle='#060210';ctx.fillRect(0,0,W,H)
  ctx.strokeStyle='rgba(227,73,237,.02)';ctx.lineWidth=0.5
  for(var x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(var y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

  // 2. 地图区域(正方形居中)
  var S=Math.min(W,H)*.82,MX=(W-S)/2,MY=(H-S)/2

  // 3. 画原图(暗底可见)
  ctx.globalAlpha=.45;ctx.drawImage(img,MX,MY,S,S);ctx.globalAlpha=1

  // 4. 边缘检测提取墙线
  var tc=document.createElement('canvas');tc.width=iw;tc.height=ih;var tctx=tc.getContext('2d');tctx.drawImage(img,0,0)
  var data=tctx.getImageData(0,0,iw,ih).data
  function B(x,y){if(x<0||x>=iw||y<0||y>=ih)return 0;var i=(y*iw+x)*4;return data[i]*.299+data[i+1]*.587+data[i+2]*.114}

  var edge=new Float32Array(iw*ih),maxE=0
  for(var y=1;y<ih-1;y++)for(var x=1;x<iw-1;x++){
    var tl=B(x-1,y-1),tc=B(x,y-1),tr=B(x+1,y-1),ml=B(x-1,y),mr=B(x+1,y),bl=B(x-1,y+1),bc=B(x,y+1),br=B(x+1,y+1)
    var gx=-tl+tr-2*ml+2*mr-bl+br,gy=-tl-2*tc-tr+bl+2*bc+br
    var e=Math.sqrt(gx*gx+gy*gy);edge[y*iw+x]=e;if(e>maxE)maxE=e
  }

  // 5. 画墙线——粉色描边
  var scale=S/iw,th=maxE*.15
  ctx.strokeStyle='rgba(245,80,200,.75)';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round'
  for(var y=0;y<ih;y+=2){
    ctx.beginPath();var d=false
    for(var x=0;x<iw;x+=2){
      if(edge[y*iw+x]>th*2 && !d){ctx.moveTo(MX+x*scale,MY+y*scale);d=true}
      else if(edge[y*iw+x]<=th && d){ctx.lineTo(MX+x*scale,MY+y*scale);d=false}
    }
    if(d)ctx.lineTo(MX+iw*scale,MY+y*scale);ctx.stroke()
  }
  for(var x=0;x<iw;x+=2){
    ctx.beginPath();var d=false
    for(var y=0;y<ih;y+=2){
      if(edge[y*iw+x]>th*2 && !d){ctx.moveTo(MX+x*scale,MY+y*scale);d=true}
      else if(edge[y*iw+x]<=th && d){ctx.lineTo(MX+x*scale,MY+y*scale);d=false}
    }
    if(d)ctx.lineTo(MX+x*scale,MY+ih*scale);ctx.stroke()
  }

  // 6. 暗角
  var g=ctx.createRadialGradient(W*.5,H*.5,W*.05,W*.5,H*.5,W*.72)
  g.addColorStop(0,'transparent');g.addColorStop(.5,'transparent');g.addColorStop(1,'rgba(5,2,14,.65)')
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H)

  // 7. 地图外框
  ctx.strokeStyle='rgba(227,73,237,.25)';ctx.lineWidth=2;ctx.strokeRect(MX-2,MY-2,S+4,S+4)
  ctx.strokeStyle='rgba(5,248,248,.06)';ctx.lineWidth=1;ctx.strokeRect(MX+2,MY+2,S-4,S-4)

  // 8. 底部条
  ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,H-28,W,28)
  ctx.strokeStyle='rgba(227,73,237,.08)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,H-28);ctx.lineTo(W,H-28);ctx.stroke()
  ctx.fillStyle='rgba(5,248,248,.3)';ctx.font='11px "PingFang SC"';ctx.textAlign='left';ctx.fillText('亚海悬城 ASCENT',14,H-7)
  ctx.fillStyle='rgba(227,73,237,.12)';ctx.textAlign='right';ctx.fillText('旗舰版战术地图',W-14,H-7)
}
img.src='/images/maps-clean/ascent.png'
</script></body></html>
