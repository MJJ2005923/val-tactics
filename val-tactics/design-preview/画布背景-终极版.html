<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>画布背景 · 终极版</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#05020c;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:8px;padding:20px}
h2{font-size:11px;letter-spacing:3px;color:rgba(5,248,248,.25)}
.canvas{width:900px;height:600px;border:1px solid rgba(227,73,237,.16);border-radius:12px;position:relative;overflow:hidden;background:#050210}
.map{position:absolute;top:10%;left:10%;width:80%;height:80%;border-radius:12px;background:rgba(12,6,22,.4);border:1px solid rgba(227,73,237,.1);z-index:2;box-shadow:0 0 80px rgba(227,73,237,.05),inset 0 0 100px rgba(5,248,248,.015),0 0 0 20px rgba(5,2,16,.75)}</style></head><body>
<h2>画布背景 · 终极旗舰版</h2>
<div class="canvas" id="c">
  <div class="map"></div>
</div>
<script>
const cnv=document.getElementById('c')

// 1. 底光三源
const bg=document.createElement('div');bg.style.cssText='position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse 500px 350px at 55% 12%,rgba(227,73,237,.08),transparent 60%),radial-gradient(ellipse 300px 220px at 6% 88%,rgba(5,248,248,.04),transparent 55%),radial-gradient(ellipse 250px 180px at 90% 66%,rgba(227,73,237,.05),transparent 50%);animation:bgBreath 12s ease-in-out infinite alternate;pointer-events:none'
cnv.appendChild(bg)

// 2. 蜂巢点阵
const hex=document.createElement('div');hex.style.cssText='position:absolute;inset:0;z-index:0;opacity:.5;background-image:radial-gradient(circle,transparent 5px,rgba(227,73,237,.035) 5.5px,transparent 6px);background-size:28px 28px;pointer-events:none'
cnv.appendChild(hex)

// 3. 四角战术标尺
function makeCorner(left,top,hDir,vDir){
  // 水平线
  const hl=document.createElement('div');hl.style.cssText=`position:absolute;z-index:1;top:${top}px;left:${left}px;width:50px;height:1px;background:rgba(5,248,248,.15);pointer-events:none`
  cnv.appendChild(hl)
  // 刻度
  for(let i=1;i<=4;i++){const tick=document.createElement('div');tick.style.cssText=`position:absolute;z-index:1;top:${top-2}px;left:${left+i*10+hDir}px;width:1px;height:${i%2?4:8}px;background:rgba(5,248,248,.12);pointer-events:none`;cnv.appendChild(tick)}
  // 竖直线
  const vl=document.createElement('div');vl.style.cssText=`position:absolute;z-index:1;top:${top+vDir}px;left:${left}px;width:1px;height:50px;background:rgba(5,248,248,.15);pointer-events:none`
  cnv.appendChild(vl)
  // 角点
  const dot=document.createElement('div');dot.style.cssText=`position:absolute;z-index:1;top:${top-2}px;left:${left-2}px;width:5px;height:5px;border-radius:50%;background:#05F8F8;box-shadow:0 0 8px #05F8F8;pointer-events:none;animation:dotPulse 2.5s ease-in-out infinite`
  cnv.appendChild(dot)
}
makeCorner(14,14,0,0);makeCorner(836,14,0,-54);makeCorner(14,582,-54,0);makeCorner(836,582,-54,-54)

// 对角光环
for(let i=0;i<2;i++){
  const d=document.createElement('div');d.style.cssText=`position:absolute;z-index:0;pointer-events:none;top:${i?5:5}%;left:${i?75:5}%;width:150px;height:150px;border-radius:50%;border:1px solid rgba(5,248,248,.08);animation:diagPulse ${3+i}s ease-in-out infinite ${i*1.5}s`
  cnv.appendChild(d)
}

// 旋转光环
const h1=document.createElement('div');h1.style.cssText='position:absolute;top:50%;left:50%;width:280px;height:280px;border-radius:50%;border:1px solid rgba(227,73,237,.06);transform:translate(-50%,-50%) rotateX(60deg);pointer-events:none;z-index:0;animation:haloSpin 20s linear infinite,haloPulse 4s ease-in-out infinite'
cnv.appendChild(h1)
const h2=document.createElement('div');h2.style.cssText='position:absolute;top:50%;left:50%;width:420px;height:420px;border-radius:50%;border:1px solid rgba(5,248,248,.04);transform:translate(-50%,-50%) rotateX(60deg);pointer-events:none;z-index:0;animation:haloSpin 25s linear infinite reverse,haloPulse 5s ease-in-out infinite 1s'
cnv.appendChild(h2)

// 脉冲环
for(let i=0;i<2;i++){
  const p=document.createElement('div');p.style.cssText=`position:absolute;top:48%;left:48%;width:100px;height:100px;border-radius:50%;border:1px solid rgba(5,248,248,.2);transform:translate(-50%,-50%);pointer-events:none;z-index:0;animation:pulseRing 6s ease-out infinite ${i*3}s`
  cnv.appendChild(p)
}

// 扫描线
const scan=document.createElement('div');scan.style.cssText='position:absolute;left:0;right:0;height:1px;pointer-events:none;z-index:0;background:linear-gradient(90deg,transparent,rgba(5,248,248,.12),transparent);animation:scanMove 6s ease-in-out infinite'
cnv.appendChild(scan)

// 粒子群
for(let i=0;i<35;i++){
  const cp=['rgba(5,248,248,.4)','rgba(227,73,237,.35)','rgba(160,200,255,.3)','rgba(255,140,220,.3)'][i%4]
  const p=document.createElement('div');p.style.cssText=`position:absolute;pointer-events:none;z-index:0;width:${1+Math.random()*3}px;height:${1+Math.random()*3}px;border-radius:50%;background:${cp};box-shadow:0 0 ${4+Math.random()*8}px ${cp};top:${Math.random()*90}%;left:${Math.random()*90}%;animation:p${i%3} ${7+Math.random()*10}s ease-in-out ${Math.random()*6}s infinite`
  cnv.appendChild(p)
}

// 底部声波条
const eq=document.createElement('div');eq.style.cssText='position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:3px;align-items:flex-end;height:20px;z-index:0;pointer-events:none'
for(let i=0;i<20;i++){
  const b=document.createElement('div');b.style.cssText=`width:3px;height:${4+Math.random()*16}px;border-radius:2px;background:rgba(5,248,248,.15);animation:eqBounce ${.8+Math.random()*.8}s ease-in-out infinite ${i*.06}s`
  eq.appendChild(b)
}
cnv.appendChild(eq)

// 数据线
for(let i=0;i<3;i++){
  const t=document.createElement('div');t.style.cssText=`position:absolute;pointer-events:none;z-index:0;height:1px;top:${15+i*35}%;left:${5+i*5}%;width:120px;background:linear-gradient(90deg,transparent,rgba(227,73,237,.15),transparent);animation:trailDrift ${8+i*3}s ease-in-out infinite ${i*2}s`
  cnv.appendChild(t)
}
</script>
<style>
@keyframes bgBreath{0%{opacity:.5}100%{opacity:1}}
@keyframes haloSpin{to{transform:translate(-50%,-50%) rotateX(60deg) rotateZ(360deg)}}
@keyframes haloPulse{0%,100%{opacity:.2}50%{opacity:.6}}
@keyframes pulseRing{0%{opacity:.8;transform:translate(-50%,-50%) scale(.5)}100%{opacity:0;transform:translate(-50%,-50%) scale(3)}}
@keyframes scanMove{0%,100%{top:18%}50%{top:78%}}
@keyframes diagPulse{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.5;transform:scale(1.2)}}
@keyframes p0{0%,100%{opacity:.08;transform:translate(0,0)}50%{opacity:.5;transform:translate(8px,-12px)}}
@keyframes p1{0%,100%{opacity:.12;transform:translate(0,0)}50%{opacity:.6;transform:translate(-6px,-10px)}}
@keyframes p2{0%,100%{opacity:.06;transform:translate(0,0)}50%{opacity:.4;transform:translate(10px,-6px)}}
@keyframes trailDrift{0%,100%{opacity:.08;transform:translateX(0)}50%{opacity:.35;transform:translateX(30px)}}
@keyframes eqBounce{0%,100%{opacity:.2}50%{opacity:.6}}
@keyframes dotPulse{0%,100%{box-shadow:0 0 6px #05F8F8}50%{box-shadow:0 0 14px #05F8F8,0 0 24px rgba(5,248,248,.3)}}
</style></body></html>
