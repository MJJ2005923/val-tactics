// 背景
ctx.fillStyle='#060210';ctx.fillRect(0,0,W,H)

// 网格
ctx.strokeStyle='rgba(227,73,237,.02)';ctx.lineWidth=0.5
for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}

// 根据真实数据绘制墙体

for(let gy=0;gy<30;gy++){
  for(let gx=0;gx<30;gx++){
    const isWall=wallSet.has(gx+','+gy)
    if(isWall){
      ctx.fillStyle='rgba(30,12,50,.7)'
      ctx.strokeStyle='rgba(180,80,220,.3)';ctx.lineWidth=1.2
    }else{
      ctx.fillStyle='rgba(10,4,22,.4)'
      ctx.strokeStyle='rgba(227,73,237,.05)';ctx.lineWidth=0.5
    }
    const x=gx*cellW,y=gy*cellH
    ctx.fillRect(x+2,y+2,cellW-4,cellH-4)
    ctx.strokeRect(x+2,y+2,cellW-4,cellH-4)
  }
}

// 站点标记 (根据已知位置)
function siteMark(cx,cy,letter,color){
  const r=45
  ctx.fillStyle=color+'12';ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill()
  ctx.strokeStyle=color+'45';ctx.lineWidth=2.5;ctx.setLineDash([8,4]);ctx.stroke();ctx.setLineDash([])
  ctx.fillStyle=color;ctx.font='bold 32px "PingFang SC"';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(letter,cx,cy)
}
siteMark(1380,260,'A','#ff4655')
siteMark(450,860,'B','#50b4f0')

// 出生点
function spawnMark(x,y,label,color){
  ctx.fillStyle=color+'15';ctx.beginPath();ctx.arc(x,y,20,0,Math.PI*2);ctx.fill()

  ctx.fillStyle=color+'50';ctx.font='10px "PingFang SC"';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,x,y)
}
spawnMark(900,60,'Ω 进攻方出生','rgba(255,70,85,.5)')
spawnMark(900,1140,'α 防守方出生','rgba(5,248,248,.4)')
