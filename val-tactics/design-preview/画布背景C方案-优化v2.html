<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>方案C · 次世代粒子</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#05020c;display:flex;align-items:center;justify-content:center;min-height:100vh;gap:12px;padding:20px;flex-direction:column}
h2{font-size:12px;letter-spacing:3px;color:rgba(5,248,248,.3)}
.canvas{width:900px;height:600px;border:1px solid rgba(227,73,237,.16);border-radius:12px;position:relative;overflow:hidden;background:#050210}
.map{position:absolute;top:12%;left:10%;width:80%;height:76%;border-radius:10px;background:rgba(12,6,22,.5);border:1px solid rgba(227,73,237,.1);z-index:1;box-shadow:0 0 60px rgba(227,73,237,.04),inset 0 0 80px rgba(5,248,248,.02)}
/* 三光源 */
.canvas::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 500px 350px at 55% 12%,rgba(227,73,237,.09),transparent 60%),radial-gradient(ellipse 300px 220px at 10% 85%,rgba(5,248,248,.04),transparent 55%),radial-gradient(ellipse 250px 180px at 88% 68%,rgba(227,73,237,.05),transparent 50%)}
/* 细网格 */
.canvas::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(227,73,237,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(227,73,237,.025) 1px,transparent 1px);background-size:45px 45px;opacity:.6}
.particle{position:absolute;pointer-events:none;z-index:0;will-change:transform,opacity}
</style></head><body>
<h2>方案C · 次世代粒子场</h2>
<div class="canvas" id="c"><div class="map"></div></div>
<script>
const c=document.getElementById('c')
const pinks=['rgba(227,73,237,.5)','rgba(200,100,255,.4)','rgba(255,100,220,.35)']
const cyans=['rgba(5,248,248,.45)','rgba(100,230,255,.4)','rgba(60,200,255,.35)']
const pGlows=['0 0 10px rgba(227,73,237,.3)','0 0 8px rgba(200,100,255,.25)','0 0 6px rgba(255,100,220,.2)']
const cGlows=['0 0 10px rgba(5,248,248,.3)','0 0 8px rgba(100,230,255,.25)','0 0 6px rgba(60,200,255,.2)']

// Layer 1: 远景微尘 (40个极淡粒子)
for(let i=0;i<40;i++){
  const p=document.createElement('div');p.className='particle'
  const s=1+Math.random()*2
  const isPink=Math.random()>.5
  p.style.cssText=`width:${s}px;height:${s}px;border-radius:50%;background:${isPink?pinks[2]:cyans[2]};box-shadow:${isPink?pGlows[2]:cGlows[2]};top:${Math.random()*90}%;left:${Math.random()*90}%;animation:floatFar ${10+Math.random()*15}s ease-in-out ${Math.random()*8}s infinite`
  c.appendChild(p)
}

// Layer 2: 中景星点 (20个)
for(let i=0;i<20;i++){
  const p=document.createElement('div');p.className='particle'
  const s=2+Math.random()*3
  const isPink=Math.random()>.5
  const gi=Math.floor(Math.random()*2)
  p.style.cssText=`width:${s}px;height:${s}px;border-radius:50%;background:${isPink?pinks[gi]:cyans[gi]};box-shadow:${isPink?pGlows[gi]:cGlows[gi]};top:${Math.random()*88}%;left:${Math.random()*88}%;animation:floatMid ${8+Math.random()*10}s cubic-bezier(.4,0,.6,1) ${Math.random()*6}s infinite`
  c.appendChild(p)
}

// Layer 3: 近景大星 (8个)
for(let i=0;i<8;i++){
  const p=document.createElement('div');p.className='particle'
  const isPink=Math.random()>.4
  p.style.cssText=`width:5px;height:5px;border-radius:50%;background:${isPink?pinks[0]:cyans[0]};box-shadow:${isPink?'0 0 16px rgba(227,73,237,.5),0 0 28px rgba(227,73,237,.15)':'0 0 16px rgba(5,248,248,.5),0 0 28px rgba(5,248,248,.15)'};top:${15+Math.random()*70}%;left:${15+Math.random()*70}%;animation:bigFloat ${6+Math.random()*6}s ease-in-out ${Math.random()*5}s infinite`
  c.appendChild(p)
}

// Layer 4: 微星环 (4个围绕地图的环)
for(let i=0;i<4;i++){
  const r=document.createElement('div');r.className='particle'
  const x=20+Math.random()*60,y=18+Math.random()*64
  r.style.cssText=`width:2px;height:2px;border-radius:50%;background:rgba(5,248,248,.3);box-shadow:0 0 6px rgba(5,248,248,.2);top:${y}%;left:${x}%;animation:orbit ${12+Math.random()*8}s linear infinite`
  c.appendChild(r)
}
</script>
<style>
@keyframes floatFar{0%,100%{opacity:.05;transform:translate(0,0)}25%{opacity:.25;transform:translate(12px,-10px)}50%{opacity:.08;transform:translate(20px,-4px)}75%{opacity:.2;transform:translate(6px,-14px)}}
@keyframes floatMid{0%,100%{opacity:.1;transform:translate(0,0)}33%{opacity:.5;transform:translate(-8px,-12px)}66%{opacity:.15;transform:translate(6px,-6px)}}
@keyframes bigFloat{0%,100%{opacity:.2;transform:translateY(0)}50%{opacity:.75;transform:translateY(-16px)}}
@keyframes orbit{0%{opacity:.1;transform:translate(0,0)}25%{opacity:.35;transform:translate(4px,-8px)}50%{opacity:.15;transform:translate(8px,0)}75%{opacity:.35;transform:translate(4px,8px)}100%{opacity:.1;transform:translate(0,0)}}
</style></body></html>
