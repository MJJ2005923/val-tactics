<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff4655"/>
      <stop offset="100%" stop-color="#ff5e6b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="400" rx="12" fill="url(#bgGrad)"/>
  <rect width="800" height="400" rx="12" fill="none" stroke="#2a2a2a" stroke-width="1"/>

  <!-- 底部装饰线 -->
  <rect x="200" y="340" width="400" height="1" fill="#2a2a2a"/>
  <rect x="300" y="345" width="200" height="2" rx="1" fill="url(#accentGrad)" filter="url(#glow)"/>

  <!-- 主标题 -->
  <text x="400" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#e8e8e8" letter-spacing="4">
    感谢你的赞助
  </text>
  <text x="400" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#e8e8e8" letter-spacing="4" filter="url(#glow)" opacity="0.3">
    感谢你的赞助
  </text>

  <!-- 副标题 -->
  <text x="400" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#888888" letter-spacing="6">
    每份支持都让战术板变得更好
  </text>

  <!-- 分隔装饰 -->
  <text x="400" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" fill="#ff4655" opacity="0.8">◆</text>

  <!-- VALORANT 风格心形图标（斜线交叉） -->
  <g transform="translate(400, 290)">
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#ff4655" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="-8" y1="8" x2="8" y2="-8" stroke="#ff4655" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- 底部文字 -->
  <text x="400" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#555555" letter-spacing="2">
    无畏契约战术板 · VALORANT TACTICS BOARD
  </text>

  <!-- 右下角 -->
  <text x="780" y="380" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#3a3a3a">
    THANK YOU FOR YOUR SUPPORT
  </text>
</svg>
